name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  bootjar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build bootJar
        run: ./gradlew bootJar --no-daemon

      - name: Upload bootJar
        uses: actions/upload-artifact@v4
        with:
          name: plantuml-mcp-bootjar
          path: build/libs/*.jar
          if-no-files-found: error
